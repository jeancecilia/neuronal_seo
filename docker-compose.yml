version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: neuronal_seo_db
    environment:
      POSTGRES_USER: neuronal_seo
      POSTGRES_PASSWORD: neuronal_seo_pass
      POSTGRES_DB: neuronal_seo
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neuronal_seo"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: neuronal_seo_redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neuronal_seo_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8001:8000"
    volumes:
      - ./app:/app/app
      - ./tests:/app/tests
      - ./reports:/app/reports
      - ./app/templates:/app/app/templates
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./cli.py:/app/cli.py
      - ./seeds:/app/seeds
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neuronal_seo_worker
    command: rq worker --url redis://redis:6379/0 neuronal_seo_tasks
    volumes:
      - ./app:/app/app
      - ./tests:/app/tests
      - ./reports:/app/reports
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neuronal_seo_scheduler
    command: python scheduler_entry.py
    volumes:
      - ./app:/app/app
      - ./reports:/app/reports
      - ./scheduler_entry.py:/app/scheduler_entry.py
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - ENABLE_SCHEDULER=true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - scheduler

volumes:
  pgdata:
