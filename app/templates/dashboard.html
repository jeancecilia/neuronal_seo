<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neuronal SEO — Dashboard</title>
<style>
  :root {
    --bg: #0f0f1a;
    --surface: #1a1a2e;
    --surface2: #16213e;
    --border: #2a2a4a;
    --text: #e0e0e0;
    --text2: #a0a0b0;
    --accent: #667eea;
    --accent2: #764ba2;
    --green: #48bb78;
    --red: #fc8181;
    --orange: #ed8936;
    --yellow: #ecc94b;
    --radius: 10px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; }
  .sidebar { width: 260px; background: var(--surface); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }
  .sidebar h1 { font-size: 18px; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 12px; }
  .sidebar .logo { font-size: 28px; margin-bottom: -8px; }
  .sidebar button { width: 100%; padding: 10px 14px; border: none; border-radius: 8px; background: transparent; color: var(--text2); cursor: pointer; text-align: left; font-size: 14px; transition: .2s; }
  .sidebar button:hover, .sidebar button.active { background: var(--surface2); color: var(--text); }
  .main { flex: 1; padding: 24px 32px; overflow-y: auto; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .header h2 { font-size: 22px; }
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 28px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; }
  .card .label { font-size: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; }
  .card .value { font-size: 28px; font-weight: 700; margin-top: 4px; }
  .card .value.critical { color: var(--red); }
  .card .value.high { color: var(--orange); }
  .section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 20px; }
  .section h3 { font-size: 16px; margin-bottom: 14px; color: var(--text); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 10px 12px; color: var(--text2); font-weight: 600; border-bottom: 1px solid var(--border); }
  td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
  tr:hover { background: var(--surface2); }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge.critical { background: #fc818122; color: var(--red); }
  .badge.high { background: #ed893622; color: var(--orange); }
  .badge.medium { background: #ecc94b22; color: var(--yellow); }
  .badge.low { background: #48bb7822; color: var(--green); }
  .badge.todo { background: #667eea22; color: var(--accent); }
  .btn { padding: 8px 18px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; transition: .2s; }
  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; }
  .btn-primary:hover { opacity: .85; }
  .btn-danger { background: #fc818122; color: var(--red); }
  .empty { text-align: center; padding: 40px; color: var(--text2); }
  .loading { text-align: center; padding: 20px; color: var(--text2); }
  select { background: var(--surface2); color: var(--text); border: 1px solid var(--border); padding: 8px 12px; border-radius: 6px; font-size: 13px; }
  .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,.7); justify-content: center; align-items: center; z-index: 100; }
  .modal.active { display: flex; }
  .modal-content { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; width: 500px; max-width: 90vw; }
  .modal-content input, .modal-content textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 10px; border-radius: 6px; margin-top: 6px; margin-bottom: 12px; font-size: 13px; }
  .modal-content label { font-size: 12px; color: var(--text2); }
  .flex { display: flex; gap: 10px; }
  .flex-end { justify-content: flex-end; }
  .mt { margin-top: 12px; }
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo">🧠</div>
  <h1>Neuronal SEO</h1>
  <button class="active" onclick="showView('overview')">📊 Overview</button>
  <button onclick="showView('projects')">📁 Projects</button>
  <button onclick="showView('tasks')">✅ Tasks</button>
  <button onclick="showView('reports')">📄 Reports</button>
  <button onclick="openCreateProject()">➕ New Project</button>
</div>

<div class="main" id="main">
  <!-- Dynamic content -->
</div>

<!-- Create Project Modal -->
<div class="modal" id="createProjectModal">
  <div class="modal-content">
    <h3>New Project</h3>
    <label>Domain</label>
    <input id="newDomain" placeholder="example.com">
    <label>Country</label>
    <input id="newCountry" value="DE">
    <label>Language</label>
    <input id="newLanguage" value="de">
    <label>Cities (comma-separated)</label>
    <input id="newCities" placeholder="Köln, Bonn, Düsseldorf">
    <label>Services (comma-separated)</label>
    <input id="newServices" placeholder="App Entwicklung, Flutter Entwicklung">
    <label>Competitors (comma-separated)</label>
    <input id="newCompetitors" placeholder="competitor1.de, competitor2.de">
    <div class="flex flex-end mt">
      <button class="btn" onclick="closeModal('createProjectModal')">Cancel</button>
      <button class="btn btn-primary" onclick="createProject()">Create</button>
    </div>
  </div>
</div>

<script>
const API = '/api/v1';
let currentProject = null;

// --- Navigation ---
function showView(view) {
  document.querySelectorAll('.sidebar button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  if (view === 'overview') loadOverview();
  else if (view === 'projects') loadProjects();
  else if (view === 'tasks') loadTasks();
  else if (view === 'reports') loadReports();
}

// --- Overview ---
async function loadOverview() {
  const main = document.getElementById('main');
  main.innerHTML = '<div class="loading">Loading...</div>';

  let projects = [];
  try { const r = await fetch(`${API}/projects/`); projects = await r.json(); } catch(e) {}

  if (!projects.length) {
    main.innerHTML = `<div class="header"><h2>📊 Dashboard</h2></div><div class="empty">No projects yet. <a href="#" onclick="openCreateProject()" style="color:var(--accent)">Create one</a> to get started.</div>`;
    return;
  }

  let totalPages = 0, totalKeywords = 0, totalTasks = 0, criticalTasks = 0;
  const stats = await Promise.all(projects.map(async p => {
    try { const r = await fetch(`${API}/projects/${p.id}/stats`); return await r.json(); } catch(e) { return {}; }
  }));

  stats.forEach(s => { totalPages += s.total_pages||0; totalKeywords += s.total_keywords||0; totalTasks += s.total_tasks||0; });

  main.innerHTML = `
    <div class="header"><h2>📊 Dashboard</h2><span style="color:var(--text2)">${projects.length} project(s)</span></div>
    <div class="cards">
      <div class="card"><div class="label">Projects</div><div class="value">${projects.length}</div></div>
      <div class="card"><div class="label">Pages Crawled</div><div class="value">${totalPages}</div></div>
      <div class="card"><div class="label">Keywords</div><div class="value">${totalKeywords}</div></div>
      <div class="card"><div class="label">SEO Tasks</div><div class="value">${totalTasks}</div></div>
    </div>
    <div class="section"><h3>📁 Projects</h3>
      <table><tr><th>Domain</th><th>Country</th><th>Language</th><th>Actions</th></tr>
      ${projects.map(p => `<tr>
        <td><strong>${p.domain}</strong></td>
        <td>${p.target_country}</td>
        <td>${p.target_language}</td>
        <td class="flex">
          <button class="btn btn-primary" onclick="runPipeline('${p.id}')">▶ Run Pipeline</button>
          <button class="btn" onclick="selectProject('${p.id}')">View</button>
        </td>
      </tr>`).join('')}
      </table>
    </div>`;
}

// --- Projects ---
async function loadProjects() {
  const main = document.getElementById('main');
  main.innerHTML = '<div class="loading">Loading...</div>';

  let projects = [];
  try { const r = await fetch(`${API}/projects/`); projects = await r.json(); } catch(e) {}

  main.innerHTML = `<div class="header"><h2>📁 Projects</h2><button class="btn btn-primary" onclick="openCreateProject()">➕ New</button></div>`;

  if (!projects.length) { main.innerHTML += '<div class="empty">No projects yet.</div>'; return; }

  for (const p of projects) {
    let stats = {};
    try { const r = await fetch(`${API}/projects/${p.id}/stats`); stats = await r.json(); } catch(e) {}
    main.innerHTML += `
      <div class="section">
        <h3>${p.domain} <span style="font-size:12px;color:var(--text2)">${p.target_country} / ${p.target_language}</span></h3>
        <div class="cards" style="margin-top:10px">
          <div class="card"><div class="label">Pages</div><div class="value">${stats.total_pages||0}</div></div>
          <div class="card"><div class="label">Keywords</div><div class="value">${stats.total_keywords||0}</div></div>
          <div class="card"><div class="label">Tasks</div><div class="value">${stats.total_tasks||0}</div></div>
          <div class="card"><div class="label">Gaps</div><div class="value">${stats.total_content_gaps||0}</div></div>
        </div>
        <div class="flex mt">
          <button class="btn btn-primary" onclick="runPipeline('${p.id}')">▶ Run Pipeline</button>
          <button class="btn" onclick="generateReport('${p.id}')">📄 Report</button>
          <button class="btn btn-danger" onclick="deleteProject('${p.id}')">🗑 Delete</button>
        </div>
      </div>`;
  }
}

// --- Tasks ---
async function loadTasks() {
  const main = document.getElementById('main');
  main.innerHTML = '<div class="loading">Loading...</div>';

  let projects = [];
  try { const r = await fetch(`${API}/projects/`); projects = await r.json(); } catch(e) {}
  if (!projects.length) { main.innerHTML = '<div class="header"><h2>✅ Tasks</h2></div><div class="empty">No projects.</div>'; return; }

  let allTasks = [];
  for (const p of projects) {
    try {
      const r = await fetch(`${API}/analysis/${p.id}/tasks?limit=50`);
      const data = await r.json();
      allTasks.push(...(data.tasks||[]).map(t => ({...t, project_domain: p.domain})));
    } catch(e) {}
  }

  allTasks.sort((a,b) => b.priority_score - a.priority_score);

  main.innerHTML = `<div class="header"><h2>✅ Tasks</h2><span style="color:var(--text2)">${allTasks.length} total</span></div>`;

  if (!allTasks.length) { main.innerHTML += '<div class="section"><div class="empty">No tasks yet. Run a pipeline to generate tasks.</div></div>'; return; }

  main.innerHTML += `<div class="section"><table><tr><th>Task</th><th>Project</th><th>Category</th><th>Priority</th><th>Score</th></tr>
    ${allTasks.map(t => `<tr>
      <td>${t.title}</td>
      <td>${t.project_domain}</td>
      <td>${t.category}</td>
      <td><span class="badge ${t.priority}">${t.priority}</span></td>
      <td>${t.priority_score}</td>
    </tr>`).join('')}
  </table></div>`;
}

// --- Reports ---
async function loadReports() {
  const main = document.getElementById('main');
  main.innerHTML = '<div class="loading">Loading...</div>';

  let projects = [];
  try { const r = await fetch(`${API}/projects/`); projects = await r.json(); } catch(e) {}
  if (!projects.length) { main.innerHTML = '<div class="header"><h2>📄 Reports</h2></div><div class="empty">No projects.</div>'; return; }

  main.innerHTML = `<div class="header"><h2>📄 Reports</h2></div>`;

  for (const p of projects) {
    let reports = [];
    try { const r = await fetch(`${API}/reports/${p.id}/list`); const d = await r.json(); reports = d.reports||[]; } catch(e) {}
    main.innerHTML += `
      <div class="section">
        <h3>${p.domain} <span style="font-size:12px;color:var(--text2)">${reports.length} reports</span></h3>
        ${reports.length ? `<table><tr><th>Title</th><th>Type</th><th>Email</th><th>Date</th></tr>
          ${reports.map(r => `<tr>
            <td>${r.title}</td>
            <td>${r.report_type}</td>
            <td>${r.email_sent?'✅ Sent':'❌'}</td>
            <td>${(r.created_at||'').substring(0,10)}</td>
          </tr>`).join('')}
        </table>` : '<div class="empty">No reports generated yet.</div>'}
        <button class="btn btn-primary mt" onclick="generateReport('${p.id}')">📄 Generate Report</button>
      </div>`;
  }
}

// --- Actions ---
function openCreateProject() { document.getElementById('createProjectModal').classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }

async function createProject() {
  const data = {
    domain: document.getElementById('newDomain').value,
    target_country: document.getElementById('newCountry').value,
    target_language: document.getElementById('newLanguage').value,
    target_cities: document.getElementById('newCities').value.split(',').map(s=>s.trim()).filter(Boolean),
    services: document.getElementById('newServices').value.split(',').map(s=>s.trim()).filter(Boolean),
    competitors: document.getElementById('newCompetitors').value.split(',').map(s=>s.trim()).filter(Boolean),
  };
  try {
    const r = await fetch(`${API}/projects/`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data) });
    if (r.ok) { closeModal('createProjectModal'); loadOverview(); }
    else alert('Failed: ' + (await r.json()).detail);
  } catch(e) { alert('Error: ' + e.message); }
}

async function runPipeline(id) {
  try {
    const r = await fetch(`${API}/pipeline/run/${id}`, { method:'POST' });
    if (r.ok) alert('Pipeline started! Check Reports tab in a few minutes.');
    else alert('Failed to start pipeline.');
  } catch(e) { alert('Error: ' + e.message); }
}

async function generateReport(id) {
  try {
    const r = await fetch(`${API}/reports/${id}/generate`, { method:'POST' });
    if (r.ok) { alert('Report generation started!'); setTimeout(loadReports, 2000); }
    else alert('Failed.');
  } catch(e) { alert('Error: ' + e.message); }
}

async function deleteProject(id) {
  if (!confirm('Delete this project and all its data?')) return;
  try {
    await fetch(`${API}/projects/${id}`, { method:'DELETE' });
    loadOverview();
  } catch(e) { alert('Error: ' + e.message); }
}

function selectProject(id) {
  currentProject = id;
  showView('projects');
}

// Start
loadOverview();
</script>
</body>
</html>
